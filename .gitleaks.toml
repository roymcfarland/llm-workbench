title = "llm-workbench gitleaks config"

# Start from gitleaks' built-in rules, then allowlist the handful of known-benign
# strings this repo intentionally commits. No real secret is committed anywhere
# (verified by full-history scan); these are CI/e2e placeholders.
[extend]
useDefault = true

[allowlist]
description = "Known-benign CI/e2e test placeholders, not real credentials."
regexes = [
  # Clerk PUBLISHABLE key — public by design; decodes to "example.accounts.dev$"
  # (Clerk's documented example key). Used as a CI/e2e env stub.
  '''pk_test_ZXhhbXBsZS5hY2NvdW50cy5kZXYk''',
  # A fake Clerk secret-key STUB used in CI/e2e — base64 decodes to the literal
  # string "test secret key for e2e". Not a real key (real ones are random).
  '''sk_test_dGVzdCUyMF9zZWNyZXRfa2V5X2Zvcl9lMmU''',
  # A constant NAME (not a value) in the Playwright config.
  '''E2E_CLERK_PUBLISHABLE_KEY''',
]
