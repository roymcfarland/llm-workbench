name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    # Align NEXT_PUBLIC_* and PLAYWRIGHT_WEB_PORT with apps/web/e2e/env.ts + e2e/listen-port.ts
    # (default port 3399) so build output matches Playwright smoke `next start` (CI-only placeholders).
    env:
      PLAYWRIGHT_WEB_PORT: "3399"
      NEXT_PUBLIC_SITE_ORIGIN: http://127.0.0.1:3399
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_dGVzdCUyMF9zZWNyZXRfa2V5X2Zvcl9lMmU
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Web typecheck
        run: npm run typecheck -w @llm-workbench/web

      - name: Web lint
        run: npm run lint -w @llm-workbench/web

      - name: Web production build
        run: npm run build:web

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      # Linux runners resolve `localhost` correctly; the Node --import DNS shim can break
      # Next 16’s internal middleware→Node proxy (30s "socket hang up" / ECONNRESET on /api/health).
      # Prefer IPv4 for `localhost` when Node would otherwise order ::1 first.
      - name: Playwright smoke
        working-directory: apps/web
        run: |
          export LLM_WB_E2E_DISABLE_DNS_SHIM=1
          export NODE_OPTIONS="${NODE_OPTIONS:+$NODE_OPTIONS }--dns-result-order=ipv4first"
          npm run test:e2e
