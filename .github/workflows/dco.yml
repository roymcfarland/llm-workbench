name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Enforce that every commit on a pull request carries a `Signed-off-by:`
# trailer matching the Developer Certificate of Origin 1.1
# (https://developercertificate.org/). This is the only contributor
# agreement required for the Apache-2.0 packages; PolyForm-NC areas have
# additional inbound terms documented in CONTRIBUTING.md.

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=()
          while read -r sha; do
            msg="$(git log -1 --format=%B "$sha")"
            author_name="$(git log -1 --format='%an' "$sha")"
            author_email="$(git log -1 --format='%ae' "$sha")"
            if ! grep -qE "^Signed-off-by: .+ <[^>]+>" <<<"$msg"; then
              missing+=("$sha — no Signed-off-by trailer")
              continue
            fi
            expected="Signed-off-by: ${author_name} <${author_email}>"
            if ! grep -Fq "$expected" <<<"$msg"; then
              missing+=("$sha — Signed-off-by does not match author (${author_name} <${author_email}>)")
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::DCO sign-off missing or mismatched on the following commits:"
            printf '  %s\n' "${missing[@]}"
            echo ""
            echo "Run: git rebase --signoff origin/${{ github.event.pull_request.base.ref }}"
            echo "Or:  git commit --amend --signoff && git push --force-with-lease"
            exit 1
          fi
          echo "All commits carry a matching Signed-off-by trailer."
