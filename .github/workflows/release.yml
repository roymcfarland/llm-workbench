name: Release

# Changesets-driven release. On push to main:
#   - if pending changesets exist, opens/updates a "Version Packages" PR
#   - when that PR merges (no pending changesets left), publishes the changed
#     @llm-workbench/* packages to npm.
#
# AUTH: npm OIDC Trusted Publishing — no NPM_TOKEN. The job mints a short-lived
# OIDC token from GitHub (`id-token: write`) that npm exchanges for publish
# rights, so there is no long-lived secret to rotate or expire. Provenance
# attestations are generated automatically by trusted publishing (no
# `--provenance` flag needed). Requires npm >= 11.5.1 (installed below).
#
# One-time setup on npmjs.com (per package — runtime, ui, adapters-react,
# ai-sdk, mcp): Settings -> Trusted Publisher -> GitHub Actions with
#   Organization or user: roymcfarland
#   Repository:           llm-workbench
#   Workflow filename:    release.yml
#   Environment:          (leave blank)
#   Allowed actions:      npm publish
#
# DORMANT BY DEFAULT: the job only runs when the repo variable
# `RELEASE_ENABLED` is set to "true" (gh variable set RELEASE_ENABLED --body true).

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version commit / tags
      pull-requests: write # open the "Version Packages" PR
      id-token: write # mint the OIDC token for trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 24
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
